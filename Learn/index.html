        id,class,tagname

        p+ul-> thẻ ul nằm ngay sau thẻ p

        <a href=""></a>
        có target chuyển đỏ : a[target]
        chỉ [target] bất kì thẻ nào có target ->tác động
        a[href="abc.com"]-> tác động chính xác thẻ a có href=abc.com
        a[href^="a"]-> khớp đầu thẻ a có href=a tác động
        a[href$="a"]-> khớp cuối thẻ a có href=a
        a[href*="a"]-> khớp href include "a"

        [class^="item-"]-> khớp đầu các class có "item-"
        content>*-> chọn tất cả các thẻ là con trực tiếp (cấp 1) của content
        THÀNH PHẦN GIẢ
        :before :thành phần giả :inline
        :after :thành phần giả: inline
        :first-line: css dòng đầu tiên của đoạn p
        :first-letter:chữ cái đầu tiề của đoạn p
        :selecttion: css màu nền, chữ của đoạn p được chọn
        LỚP GIẢ
        .email:placeholder-> css phần placeholder trong input

        :active->click chuột tồn tại tất cả thành phần
        :forcus->click vào di chuột ra ngoài =ok , có thể used=tab chỉ tồn tại trong form
        :hover->trỏ chuột tồn tại tất cả thành phần

        biến bất kì thành phần nào cũng có forcus thêm thuộc tính tabindex
        tabindex=<number> (number: số thứ tự của tab)

        checked :một trạng thái của input:checkbox hoặc input:radio
        disable :không thể chọn
        ví dụ css cho disable: input[disabled] hoặc sử dụng lớp giả :disabled
        css loại trừ bằng cách sử dụng lớp giả not ví dụ h2:not(.active)
        first-child->cùng loại thẻ hoặc class id selector đầu tiên(last-child tương tự)
        first-of-type :thẻ đầu tiên cùng kiểu với nhau hoặc duy nhất mỗi nó(last-of-type tương tự)
        nth-child(n)-> n bắt đầu từ 1 : số thứ tự của element cùng cha
        (2n+2): n chạy từ 0 -> chọn các phần tử chẵn
        n là tham số cố định ko đổi
        nth-of-type(n)-> n bắt đầu từ 1: n là số thứ tự của element cùng kiểu

Dùng scss để responsive @for $i from 1 through 12 {

  }

$breakpoints: (
  sm: 576,
  md: 768,
  lg: 992,
  xl: 1200,
  xxl: 1400,
);
@mixin column($name: "") {
  $prefix: ".col-";
  @for $i from 1 through 12 {
    $selector: $prefix + $i;
    @if ($name != "") {
      $selector: $prefix + $name + "-" + $i;
    }
    #{$selector} {
      --column-size: #{$i};
    }
  }
}
@include column();

@each $name, $breakpoint in $breakpoints {
  @media screen and (min-width:#{$breakpoint}px) {
    @include column($name);
  }
}

var btn = document.querySelector('.btn')
var isPress = false;
var clientX, clientY, offsetX, offsetY;
btn.addEventListener('mousedown', function(e) {
    isPress = true;
    offsetX = e.offsetX;
    offsetY = e.offsetY;
})
document.addEventListener('mouseup', function(e) {
    isPress = false;
})
document.addEventListener('mousemove', function(e) {
    if (isPress) {
        btn.style.left = e.clientX - offsetX - 10 + 'px';
        btn.style.top = e.clientY - offsetY - 10 + 'px';
    }
})

    var checkStatus = this.checked
    if (checkStatus) check.forEach(function(item) {
        item.checked = true
    })
    else check.forEach(function(item) {
        item.checked = false
    })
})
check.forEach(function(item) {
    item.addEventListener('change', function() {
        var status = Array.from(check).every(function(checkbox) {
            return checkbox.checked === true
        })
        checkAll.checked = status;
    })
})

var loginForm = document.querySelector(".login-form");

var handleBeforeUnload = function(event) {
    event.returnValue = 1;
};

loginForm.addEventListener("input", function(e) {
    if (e.target.type === "checkbox" || e.target.type === "radio") {
        if (e.target.defaultChecked !== e.target.checked) {
            window.addEventListener("beforeunload", handleBeforeUnload);
        } else {
            window.removeEventListener("beforeunload", handleBeforeUnload);
        }
    } else {
        if (e.target.defaultValue !== e.target.value) {
            window.addEventListener("beforeunload", handleBeforeUnload);
        } else {
            window.removeEventListener("beforeunload", handleBeforeUnload);
        }
    }
});

loginForm.addEventListener("submit", function(e) {
    e.preventDefault();
    window.removeEventListener("beforeunload", handleBeforeUnload);
    this.submit();
});
